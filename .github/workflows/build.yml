name: Build Debug APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Download Gradle 8.5
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.5-bin.zip -o gradle.zip
          unzip -q gradle.zip
          echo "GRADLE=$(pwd)/gradle-8.5/bin/gradle" >> "$GITHUB_ENV"

      - name: Build debug APK
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
        run: ${{ env.GRADLE }} assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-reply-float-debug
          path: app/build/outputs/apk/debug/app-debug.apk
